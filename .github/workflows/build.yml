name: Build Minimal Sky OS
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ISO
        run: |
          mkdir -p output
          
          docker run --privileged --rm -v $(pwd)/output:/output debian:bookworm-slim bash -c "
            set -e
            apt-get update
            apt-get install -y live-build wget ca-certificates --no-install-recommends
            
            mkdir -p /build && cd /build
            
            # הגדרות בסיס - נקיות משגיאות
            lb config \
              --mode debian \
              --iso-volume 'Sky-OS' \
              --distribution bookworm \
              --architectures amd64 \
              --binary-images iso-hybrid \
              --apt-indices false \
              --memtest none \
              --bootappend-live 'boot=live components quiet splash locales=he_IL.UTF-8' \
              --security false \
              --updates false;

            # חבילות מינימליות
            mkdir -p config/package-lists
            echo 'xorg openbox feh badwolf ca-certificates' > config/package-lists/mygui.list.chroot

            # --- רקע דסקטופ (עם דילוג על שגיאות הורדה) ---
            mkdir -p config/includes.chroot/usr/share/images/desktop/
            wget --no-check-certificate -q -O config/includes.chroot/usr/share/images/desktop/sky.jpg 'https://theconversation.com' || true

            # --- הפעלה אוטומטית ---
            mkdir -p config/includes.chroot/etc/xdg/openbox/
            echo 'feh --bg-fill /usr/share/images/desktop/sky.jpg &' > config/includes.chroot/etc/xdg/openbox/autostart
            echo 'badwolf &' >> config/includes.chroot/etc/xdg/openbox/autostart
            chmod +x config/includes.chroot/etc/xdg/openbox/autostart

            # --- מניעת שגיאה 123: ביטול מניפולציות ידניות על isolinux ---
            # במקום ליצור קבצים ידנית, נותנים ל-live-build לעשות את העבודה שלו.
            
            # בנייה עם מנגנון התאוששות משגיאות
            lb build || (echo 'Build failed, checking logs...' && exit 1)
            
            # העברת הקובץ הסופי
            if [ -f *.iso ]; then
              cp *.iso /output/Sky-OS.iso
            else
              echo 'No ISO found!' && exit 1
            fi
          "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Sky-OS
          path: output/Sky-OS.iso
          if-no-files-found: error
