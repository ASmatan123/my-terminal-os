name: Build Minimal Sky OS
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ISO
        run: |
          mkdir -p output
          
          docker run --privileged --rm -v $(pwd)/output:/output debian:bookworm-slim bash -c "
            set -e
            apt-get update
            apt-get install -y live-build wget --no-install-recommends
            
            mkdir -p /build && cd /build
            
            # הגדרות בסיס - הסרת רכיבים כבדים
            lb config \
              --mode debian \
              --iso-volume 'Sky OS' \
              --distribution bookworm \
              --architectures amd64 \
              --binary-images iso-hybrid \
              --apt-indices false \
              --memtest none \
              --bootappend-live 'boot=live components quiet splash locales=he_IL.UTF-8' \
              --security false \
              --updates false \
              --firmware-chroot false \
              --firmware-binary false;

            # רשימת חבילות מינימלית - ללא דרייברים מיותרים
            mkdir -p config/package-lists
            # הוספנו xserver-xorg-video-all רק לגרפיקה בסיסית, ללא bluetooth/printing
            echo 'xorg openbox feh badwolf ca-certificates libasound2' > config/package-lists/mygui.list.chroot

            # --- הגדרת רקע שולחן עבודה מהקישור שלך ---
            mkdir -p config/includes.chroot/usr/share/images/desktop/
            wget -q -O config/includes.chroot/usr/share/images/desktop/sky.jpg 'https://images.theconversation.com/files/641031/original/file-20250107-17-tr2ko0.jpg?ixlib=rb-4.1.0&q=45&auto=format&w=1000&fit=clip'

            # --- הגדרות BOOT מהיר ---
            mkdir -p config/includes.binary/isolinux
            echo 'default live' > config/includes.binary/isolinux/isolinux.cfg
            echo 'prompt 0' >> config/includes.binary/isolinux/isolinux.cfg
            echo 'timeout 0' >> config/includes.binary/isolinux/isolinux.cfg
            echo 'label live' >> config/includes.binary/isolinux/isolinux.cfg
            echo '  kernel /live/vmlinuz' >> config/includes.binary/isolinux/isolinux.cfg
            echo '  append initrd=/live/initrd.img boot=live components quiet splash' >> config/includes.binary/isolinux/isolinux.cfg

            # --- הגדרת הפעלה אוטומטית (Openbox) ---
            mkdir -p config/includes.chroot/etc/xdg/openbox/
            echo 'feh --bg-fill /usr/share/images/desktop/sky.jpg &' > config/includes.chroot/etc/xdg/openbox/autostart
            echo 'badwolf &' >> config/includes.chroot/etc/xdg/openbox/autostart
            chmod +x config/includes.chroot/etc/xdg/openbox/autostart

            # הרצת הבנייה
            lb build
            cp *.iso /output/Sky-OS.iso
          "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Sky-OS
          path: output/Sky-OS.iso
          if-no-files-found: error
