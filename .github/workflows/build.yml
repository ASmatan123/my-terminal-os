name: Build My OS
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build ISO using Docker
        run: |
          # אנחנו משתמשים ב"מפעל" מוכן שרץ בתוך דוקר
          docker run --privileged --rm -v $(pwd):/dist debian:bookworm-slim bash -c "
            apt-get update && apt-get install -y live-build;
            mkdir /build && cd /build;
            lb config --architectures amd64 --binary-images iso-hybrid --memtest none;
            lb build;
            cp *.iso /dist/my-os.iso"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Final-Terminal-OS
          path: my-os.iso
