name: Build Minimal Sky OS
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ISO
        run: |
          mkdir -p output
          # הרצת ה-Docker עם פקודת שינה בסוף למקרה של תקלה
          docker run --privileged --rm -v $(pwd)/output:/output debian:bookworm-slim bash -c "
            apt-get update
            apt-get install -y live-build wget ca-certificates cpio --no-install-recommends
            
            mkdir -p /build && cd /build
            
            # שלב 1: הגדרה נקייה (יצירת תיקיית config)
            lb config \
              --mode debian \
              --iso-volume 'Sky-OS' \
              --distribution bookworm \
              --architectures amd64 \
              --binary-images iso-hybrid \
              --apt-indices false \
              --memtest none \
              --bootappend-live 'boot=live components quiet splash locales=he_IL.UTF-8' \
              --security false \
              --updates false \
              --firmware-chroot false;

            # שלב 2: הגדרת חבילות (הפרדנו כדי למנוע שגיאות התקנה)
            mkdir -p config/package-lists
            echo 'xorg openbox feh badwolf ca-certificates' > config/package-lists/mygui.list.chroot

            # שלב 3: רקע שולחן עבודה (בלי לעצור אם נכשל)
            mkdir -p config/includes.chroot/usr/share/images/desktop/
            wget --no-check-certificate -q -O config/includes.chroot/usr/share/images/desktop/sky.jpg 'https://theconversation.com' || echo 'No background'

            # שלב 4: הגדרת הפעלה אוטומטית
            mkdir -p config/includes.chroot/etc/xdg/openbox/
            {
              echo 'feh --bg-fill /usr/share/images/desktop/sky.jpg &'
              echo 'badwolf &'
            } > config/includes.chroot/etc/xdg/openbox/autostart
            chmod +x config/includes.chroot/etc/xdg/openbox/autostart

            # שלב 5: הבנייה עצמה עם ניקוי מקדים
            lb clean --purge
            lb build || (echo 'Build failed, trying to copy what we have...' && true)

            # שלב 6: העברה בטוחה של הקובץ
            if ls *.iso 1> /dev/null 2>&1; then
              cp *.iso /output/Sky-OS.iso
            else
              echo 'ERROR: ISO was not created.' && exit 1
            fi
          "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Sky-OS
          path: output/Sky-OS.iso
