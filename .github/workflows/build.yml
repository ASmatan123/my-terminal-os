name: Build My OS
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap xorriso mtools squashfs-tools grub-pc-bin grub-efi-amd64-bin

      - name: Build Terminal OS
        run: |
          mkdir -p workspace/chroot
          # הורדת מערכת בסיסית (טרמינל בלבד)
          sudo debootstrap --variant=minbase --arch=amd64 bookworm workspace/chroot http://debian.org
          
          # יצירת מבנה ה-ISO
          mkdir -p workspace/image/live
          sudo mksquashfs workspace/chroot workspace/image/live/filesystem.squashfs -comp xz
          
          # יצירת קובץ ה-ISO עצמו
          # (אנחנו יוצרים ISO פשוט שמתאים לבוט בסיסי)
          sudo xorriso -as mkisofs -o workspace/terminal-os.iso workspace/image/

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Terminal-OS
          path: workspace/terminal-os.iso
