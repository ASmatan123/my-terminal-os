name: Build My OS
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Builder Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build xorriso debootstrap

      - name: Configure and Build
        run: |
          mkdir mybuild && cd mybuild
          
          # הגדרה שמתקנת את שגיאת ה-404 של האבטחה
          sudo lb config \
            --mode debian \
            --distribution bookworm \
            --architectures amd64 \
            --binary-images iso-hybrid \
            --security false \
            --updates false \
            --mirror-binary "http://debian.org" \
            --memtest none
          
          # בנייה בפועל
          sudo lb build

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: My-Terminal-OS
          path: mybuild/*.iso
