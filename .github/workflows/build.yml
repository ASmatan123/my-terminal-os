name: Build Minimal Sky OS
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ISO
        run: |
          mkdir -p output
          docker run --privileged --rm -v $(pwd)/output:/output debian:bookworm-slim bash -c "
            set -x # זה יראה לנו בדיוק איפה זה נכשל בלוג
            apt-get update
            apt-get install -y live-build wget ca-certificates --no-install-recommends
            
            mkdir -p /build && cd /build
            
            # שלב 1: הגדרה סופר בסיסית
            lb config \
              --mode debian \
              --iso-volume 'Sky-OS' \
              --distribution bookworm \
              --architectures amd64 \
              --binary-images iso-hybrid \
              --memtest none \
              --apt-indices false \
              --bootappend-live 'boot=live components quiet splash';

            # שלב 2: חבילות (רק מה שחייבים)
            mkdir -p config/package-lists
            echo 'xorg openbox feh badwolf ca-certificates' > config/package-lists/my.list.chroot

            # שלב 3: סקריפט אוטומציה במקום קבצים ידניים (זה מונע שגיאות 123 ו-1)
            mkdir -p config/hooks/live
            cat <<EOF > config/hooks/live/001-setup-desktop.chroot
            #!/bin/sh
            mkdir -p /usr/share/images/desktop/
            wget --no-check-certificate -q -O /usr/share/images/desktop/sky.jpg 'https://theconversation.com' || true
            
            mkdir -p /etc/xdg/openbox/
            echo 'feh --bg-fill /usr/share/images/desktop/sky.jpg &' > /etc/xdg/openbox/autostart
            echo 'badwolf &' >> /etc/xdg/openbox/autostart
            chmod +x /etc/xdg/openbox/autostart
            EOF
            chmod +x config/hooks/live/001-setup-desktop.chroot

            # שלב 4: בנייה
            lb build
            
            # שלב 5: חיפוש ה-ISO והעתקה (גם אם השם משתנה)
            find . -name '*.iso' -exec cp {} /output/Sky-OS.iso \;
          "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Sky-OS
          path: output/Sky-OS.iso
