name: Build Minimal Sky OS
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ISO
        run: |
          mkdir -p output
          docker run --privileged --rm -v $(pwd)/output:/output debian:bookworm-slim bash -c "
            set -e
            apt-get update
            apt-get install -y live-build wget ca-certificates --no-install-recommends
            
            mkdir -p /build && cd /build
            
            # פתרון לשגיאה 123: שם פשוט ללא תווים מיוחדים או רווחים
            lb config \
              --mode debian \
              --iso-volume 'SkyOS' \
              --distribution bookworm \
              --architectures amd64 \
              --binary-images iso-hybrid \
              --apt-indices false \
              --memtest none \
              --bootappend-live 'boot=live components quiet splash';

            # חבילות (קלות ומהירות)
            mkdir -p config/package-lists
            echo 'xorg openbox feh badwolf ca-certificates' > config/package-lists/my.list.chroot

            # הגדרת הרקע מהקישור שלך
            mkdir -p config/includes.chroot/usr/share/images/desktop/
            wget --no-check-certificate -q -O config/includes.chroot/usr/share/images/desktop/sky.jpg 'https://theconversation.com' || true

            # הפעלה אוטומטית
            mkdir -p config/includes.chroot/etc/xdg/openbox/
            echo 'feh --bg-fill /usr/share/images/desktop/sky.jpg &' > config/includes.chroot/etc/xdg/openbox/autostart
            echo 'badwolf &' >> config/includes.chroot/etc/xdg/openbox/autostart
            chmod +x config/includes.chroot/etc/xdg/openbox/autostart

            # בנייה
            lb build
            
            # העתקה בטוחה של ה-ISO לתיקייה שרואים מבחוץ
            cp *.iso /output/Sky-OS.iso
          "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Sky-OS
          path: output/Sky-OS.iso
          if-no-files-found: error
