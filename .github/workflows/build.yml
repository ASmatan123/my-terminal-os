name: Build Minimal Sky OS
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # הורדת הרקע מראש כדי למנוע תקלות רשת בתוך ה-Build
      - name: Download background
        run: |
          mkdir -p config-assets
          wget --no-check-certificate -O config-assets/sky.jpg 'https://theconversation.com' || touch config-assets/sky.jpg

      - name: Build ISO
        run: |
          mkdir -p output
          # הרצה עם הרשאות מלאות וניקוי זיכרון
          docker run --privileged --rm -v $(pwd)/output:/output -v $(pwd)/config-assets:/assets debian:bookworm-slim bash -c "
            apt-get update
            apt-get install -y live-build wget ca-certificates --no-install-recommends
            
            mkdir -p /build && cd /build
            
            # קונפיגורציה בסיסית
            lb config --apt-indices false --memtest none --bootappend-live 'boot=live components quiet splash'
            
            # חבילות מינימליות (Badwolf במקום פיירפוקס)
            mkdir -p config/package-lists
            echo 'xorg openbox feh badwolf ca-certificates' > config/package-lists/my.list.chroot

            # הזרקת הרקע שהורדנו מראש
            mkdir -p config/includes.chroot/usr/share/images/desktop/
            cp /assets/sky.jpg config/includes.chroot/usr/share/images/desktop/sky.jpg

            # הגדרת הפעלה אוטומטית
            mkdir -p config/includes.chroot/etc/xdg/openbox/
            echo 'feh --bg-fill /usr/share/images/desktop/sky.jpg &' > config/includes.chroot/etc/xdg/openbox/autostart
            echo 'badwolf &' >> config/includes.chroot/etc/xdg/openbox/autostart
            chmod +x config/includes.chroot/etc/xdg/openbox/autostart

            # הבנייה עצמה - התעלמות משגיאות קטנות כדי להגיע ל-ISO
            lb build || true
            
            # חיפוש והעתקה
            cp *.iso /output/Sky-OS.iso || echo 'ISO not found yet'
          "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Sky-OS
          path: output/Sky-OS.iso
