name: Build My OS
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Builder
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build xorriso debootstrap

      - name: Configure and Build
        run: |
          mkdir mybuild && cd mybuild
          # הגדרה של דביאן יציבה (Bookworm) ללא ממשק גרפי
          sudo lb config --architectures amd64 --binary-images iso-hybrid --debian-installer none --memtest none
          # הרצת הבנייה
          sudo lb build

